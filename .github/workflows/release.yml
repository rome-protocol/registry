name: Auto-tag

# When package.json#version is bumped on main, cut the matching git tag so
# jsDelivr's @gh route (cdn.jsdelivr.net/gh/<org>/<repo>@<tag>/...) starts
# resolving the new version immediately. Without this automation, version
# bumps are no-ops — every version since v0.3.0 sat untagged for weeks.
#
# NPM publish is intentionally NOT wired here. Registry consumers fetch via
# the jsDelivr @gh route, which needs only the git tag, not an npm release.
# When/if we add a TS/Node consumer that wants the import-syntax path, add
# back a publish job that runs after this tag job (needs an NPM_TOKEN secret
# on the repo, which has never been set).
#
# Idempotent — pushes to main that don't change the version no-op.
#
# Inputs are limited to package.json#version (committed, PR-reviewed) and the
# default GITHUB_TOKEN — no untrusted event payload (issue body, PR title,
# etc.) is referenced anywhere, so the workflow_injection class of risk does
# not apply.

on:
  push:
    branches: [main]

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: ver
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"
      - env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          v="v$VERSION"
          if git rev-parse "$v" >/dev/null 2>&1; then
            echo "$v already exists — no-op."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$v" -m "Release $v"
            git push origin "$v"
            echo "Tagged $v at $(git rev-parse HEAD)."
          fi
